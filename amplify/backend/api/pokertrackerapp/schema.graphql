# Global auth rule - all authenticated users can read/write.
# For a private home game, switch to { allow: private } after testing.
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } }

type Player @model {
  id: ID!
  name: String!
  games: [GamePlayer] @hasMany
}

type Game @model {
  id: ID!
  date: AWSDate!
  isComplete: Boolean!
  notes: String
  players: [GamePlayer] @hasMany
}

type GamePlayer @model {
  id: ID!
  gameID: ID! @index(name: "byGame")
  playerID: ID! @index(name: "byPlayer")
  game: Game @belongsTo(fields: ["gameID"])
  player: Player @belongsTo(fields: ["playerID"])
  buyIn: Float!
  rebuys: Float
  cashOut: Float
}
